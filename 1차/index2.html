<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black & White Candy Sushi Prototype</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050505;
      font-family: Arial, sans-serif;
    }

    /* A3 가로 비율 */
    .a3-screen {
      position: relative;
      width: min(100vw, calc(100vh * 1.414));
      height: min(100vh, calc(100vw / 1.414));
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.14), transparent 34%),
        linear-gradient(180deg, #151515 0%, #050505 100%);
      border: 10px solid #111;
      box-shadow:
        0 0 60px rgba(0,0,0,0.9),
        inset 0 0 80px rgba(255,255,255,0.03);
    }

    .title {
      position: absolute;
      top: 28px;
      left: 40px;
      z-index: 10;
      color: #f5f5f5;
      letter-spacing: 0.08em;
      font-size: clamp(18px, 2vw, 34px);
      font-weight: 700;
    }

    .subtitle {
      position: absolute;
      top: 72px;
      left: 42px;
      z-index: 10;
      color: rgba(255, 255, 255, 0.58);
      font-size: clamp(10px, 1vw, 16px);
      letter-spacing: 0.08em;
    }

    .conveyor-area {
      position: absolute;
      left: 0;
      right: 0;
      top: 18%;
      bottom: 8%;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    .belt-row {
      position: relative;
      width: 100%;
      height: 28%;
      overflow: hidden;
    }

    /* 흑백 레일 */
    .belt-track {
      position: absolute;
      left: -5%;
      top: 53%;
      width: 110%;
      height: 48%;
      transform: translateY(-50%);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), transparent 26%),
        repeating-linear-gradient(
          90deg,
          #202020 0px,
          #202020 48px,
          #121212 48px,
          #121212 96px
        );
      box-shadow:
        inset 0 12px 18px rgba(255,255,255,0.08),
        inset 0 -16px 24px rgba(0,0,0,0.75),
        0 18px 24px rgba(0,0,0,0.55);
    }

    /* 접시 간격 20px */
    .plate-line {
      position: absolute;
      top: 50%;
      left: 0;
      display: flex;
      gap: 20px;
      align-items: center;
      transform: translateY(-50%);
      width: max-content;
      animation: moveLeft 18s linear infinite;
    }

    .belt-row:nth-child(2) .plate-line {
      animation-duration: 22s;
      animation-direction: reverse;
    }

    .belt-row:nth-child(3) .plate-line {
      animation-duration: 20s;
    }

    @keyframes moveLeft {
      from {
        transform: translateY(-50%) translateX(0);
      }
      to {
        transform: translateY(-50%) translateX(-50%);
      }
    }

    /* 접시 크기 확대 */
    .plate-wrap {
      position: relative;
      width: 230px;
      height: 135px;
      flex-shrink: 0;
    }

    /* 실제 접시처럼 보이도록 도자기 질감 */
    .plate {
      position: absolute;
      left: 0;
      bottom: 10px;
      width: 230px;
      height: 88px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 33%, rgba(255,255,255,0.98) 0%, rgba(245,245,245,0.95) 28%, rgba(205,205,205,0.92) 55%, rgba(110,110,110,0.9) 100%);
      box-shadow:
        inset 0 8px 13px rgba(255,255,255,0.9),
        inset 0 -18px 20px rgba(0,0,0,0.34),
        0 18px 26px rgba(0,0,0,0.65);
      overflow: visible;
    }

    /* 접시 안쪽 홈 */
    .plate::before {
      content: "";
      position: absolute;
      left: 30px;
      top: 16px;
      width: 170px;
      height: 46px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.9), rgba(230,230,230,0.7) 48%, rgba(130,130,130,0.22) 100%);
      border: 2px solid rgba(80,80,80,0.25);
      box-shadow:
        inset 0 5px 8px rgba(255,255,255,0.9),
        inset 0 -8px 10px rgba(0,0,0,0.22);
    }

    /* 접시 아래 굽 */
    .plate::after {
      content: "";
      position: absolute;
      left: 28px;
      bottom: -13px;
      width: 174px;
      height: 38px;
      border-radius: 50%;
      background:
        linear-gradient(180deg, #d8d8d8 0%, #777 48%, #222 100%);
      z-index: -1;
      box-shadow:
        inset 0 6px 8px rgba(255,255,255,0.45),
        0 10px 14px rgba(0,0,0,0.6);
    }

    /* 접시 위 하이라이트 */
    .plate-highlight {
      position: absolute;
      left: 46px;
      top: 44px;
      width: 76px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.42);
      filter: blur(3px);
      z-index: 3;
      pointer-events: none;
    }

    .sweet {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      z-index: 5;
      filter:
        grayscale(100%)
        drop-shadow(0 14px 8px rgba(0,0,0,0.58));
    }

    /* 흑백 둥근 사탕 */
    .candy-ball {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 22%, #ffffff 0%, #e5e5e5 13%, transparent 22%),
        radial-gradient(circle at 62% 72%, #e8e8e8 0%, #777 50%, #111 100%);
      box-shadow:
        inset 8px 8px 14px rgba(255,255,255,0.55),
        inset -10px -12px 18px rgba(0,0,0,0.55);
    }

    /* 흑백 젤리 */
    .jelly {
      width: 88px;
      height: 62px;
      border-radius: 45% 45% 35% 35%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), transparent 18%),
        linear-gradient(135deg, #f6f6f6, #999 45%, #252525 100%);
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.5),
        inset -10px -10px 18px rgba(0,0,0,0.46);
    }

    /* 흑백 막대 사탕 */
    .lollipop {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background:
        repeating-radial-gradient(
          circle,
          #eeeeee 0px,
          #eeeeee 8px,
          #555 8px,
          #555 16px,
          #111 16px,
          #111 24px
        );
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.5),
        inset -10px -12px 18px rgba(0,0,0,0.55);
    }

    .lollipop::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 63px;
      width: 8px;
      height: 52px;
      transform: translateX(-50%) rotate(-18deg);
      background: linear-gradient(180deg, #f4f4f4, #777);
      border-radius: 999px;
      z-index: -1;
    }

    /* 흑백 각진 젤리 */
    .cube-jelly {
      width: 74px;
      height: 74px;
      border-radius: 16px;
      transform: translateX(-50%) rotate(12deg);
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 18%),
        linear-gradient(135deg, #ffffff, #9a9a9a 48%, #181818 100%);
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.45),
        inset -12px -12px 18px rgba(0,0,0,0.5);
    }

    /* 흑백 하트 젤리 */
    .heart-jelly {
      width: 78px;
      height: 68px;
      background:
        linear-gradient(135deg, #f5f5f5, #8b8b8b 52%, #161616 100%);
      transform: translateX(-50%) rotate(-8deg);
      border-radius: 50% 50% 45% 45%;
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.45),
        inset -12px -12px 18px rgba(0,0,0,0.48);
    }

    .heart-jelly::before,
    .heart-jelly::after {
      content: "";
      position: absolute;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: inherit;
      top: -16px;
    }

    .heart-jelly::before {
      left: 0;
    }

    .heart-jelly::after {
      right: 0;
    }

    /* 일반 접시 위 음식도 흑백 */
    .mini-food {
      position: absolute;
      left: 50%;
      top: 30px;
      width: 84px;
      height: 28px;
      transform: translateX(-50%);
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.8), transparent 18%),
        linear-gradient(135deg, #e8e8e8, #777 55%, #222 100%);
      z-index: 4;
      box-shadow:
        inset 5px 5px 8px rgba(255,255,255,0.38),
        inset -7px -7px 12px rgba(0,0,0,0.42),
        0 8px 8px rgba(0,0,0,0.45);
    }

    .special {
      cursor: pointer;
    }

    .special .plate {
      outline: 2px solid rgba(255,255,255,0.5);
      outline-offset: 5px;
    }

    .special:hover {
      transform: translateY(-6px);
      transition: 0.25s;
    }

    .special:hover .sweet {
      animation: bounce 0.55s ease infinite alternate;
    }

    @keyframes bounce {
      from {
        transform: translateX(-50%) translateY(0);
      }
      to {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    .guide {
      position: absolute;
      right: 38px;
      bottom: 28px;
      color: rgba(255,255,255,0.55);
      font-size: clamp(10px, 1vw, 15px);
      letter-spacing: 0.04em;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      z-index: 20;
    }
  </style>
</head>
