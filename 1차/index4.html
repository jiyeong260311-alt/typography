<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candy Plate Prototype</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #c9d2db;
      font-family: Arial, sans-serif;
      cursor: default;
    }

    /* A3 가로 비율 */
    .a3-screen {
      position: relative;
      width: min(100vw, calc(100vh * 1.414));
      height: min(100vh, calc(100vw / 1.414));
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.45), transparent 34%),
        linear-gradient(180deg, #dde5ec 0%, #bfc9d4 100%);
      border: 10px solid rgba(255,255,255,0.35);
      box-shadow:
        0 0 60px rgba(0,0,0,0.22),
        inset 0 0 80px rgba(255,255,255,0.12);
    }

    .title {
      position: absolute;
      top: 28px;
      left: 40px;
      z-index: 10;
      color: #1b1f22;
      letter-spacing: 0.08em;
      font-size: clamp(18px, 2vw, 34px);
      font-weight: 700;
    }

    .subtitle {
      position: absolute;
      top: 72px;
      left: 42px;
      z-index: 10;
      color: rgba(27, 31, 34, 0.65);
      font-size: clamp(10px, 1vw, 16px);
      letter-spacing: 0.08em;
    }

    .conveyor-area {
      position: absolute;
      left: 0;
      right: 0;
      top: 18%;
      bottom: 8%;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    .belt-row {
      position: relative;
      width: 100%;
      height: 28%;
      overflow: hidden;
    }

    .plate-line {
      position: absolute;
      top: 50%;
      left: 0;
      display: flex;
      gap: 20px;
      align-items: center;
      transform: translateY(-50%);
      width: max-content;
      animation: moveLeft 18s linear infinite;
    }

    .belt-row:nth-child(2) .plate-line {
      animation-duration: 22s;
      animation-direction: reverse;
    }

    .belt-row:nth-child(3) .plate-line {
      animation-duration: 20s;
    }

    @keyframes moveLeft {
      from {
        transform: translateY(-50%) translateX(0);
      }
      to {
        transform: translateY(-50%) translateX(-50%);
      }
    }

    .plate-wrap {
      position: relative;
      width: 230px;
      height: 135px;
      flex-shrink: 0;
    }

    /* 기본 밝은 접시 */
    .plate {
      position: absolute;
      left: 0;
      bottom: 10px;
      width: 230px;
      height: 88px;
      border-radius: 50%;
      background:
        radial-gradient(
          ellipse at 50% 33%,
          rgba(255,255,255,0.98) 0%,
          rgba(246,246,246,0.96) 28%,
          rgba(211,211,211,0.93) 55%,
          rgba(125,125,125,0.9) 100%
        );
      box-shadow:
        inset 0 8px 13px rgba(255,255,255,0.95),
        inset 0 -18px 20px rgba(0,0,0,0.22),
        0 20px 28px rgba(0,0,0,0.18);
      overflow: visible;
    }

    .plate::before {
      content: "";
      position: absolute;
      left: 30px;
      top: 16px;
      width: 170px;
      height: 46px;
      border-radius: 50%;
      background:
        radial-gradient(
          ellipse at 50% 30%,
          rgba(255,255,255,0.96),
          rgba(235,235,235,0.82) 48%,
          rgba(150,150,150,0.24) 100%
        );
      border: 2px solid rgba(80,80,80,0.18);
      box-shadow:
        inset 0 5px 8px rgba(255,255,255,0.9),
        inset 0 -8px 10px rgba(0,0,0,0.16);
    }

    .plate::after {
      content: "";
      position: absolute;
      left: 28px;
      bottom: -13px;
      width: 174px;
      height: 38px;
      border-radius: 50%;
      background:
        linear-gradient(180deg, #e0e0e0 0%, #8c8c8c 48%, #373737 100%);
      z-index: -1;
      box-shadow:
        inset 0 6px 8px rgba(255,255,255,0.45),
        0 10px 14px rgba(0,0,0,0.16);
    }

    /* 클릭 가능한 검은 접시 */
    .plate-wrap.special .plate {
      background:
        radial-gradient(
          ellipse at 50% 33%,
          rgba(70,70,70,1) 0%,
          rgba(35,35,35,1) 32%,
          rgba(18,18,18,1) 55%,
          rgba(0,0,0,1) 100%
        );
      box-shadow:
        inset 0 8px 10px rgba(255,255,255,0.08),
        inset 0 -20px 24px rgba(0,0,0,0.8),
        0 22px 30px rgba(0,0,0,0.34);
    }

    .plate-wrap.special .plate::before {
      background:
        radial-gradient(
          ellipse at 50% 30%,
          rgba(65,65,65,0.95),
          rgba(22,22,22,0.95) 48%,
          rgba(0,0,0,0.92) 100%
        );
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow:
        inset 0 5px 8px rgba(255,255,255,0.08),
        inset 0 -8px 10px rgba(0,0,0,0.45);
    }

    .plate-wrap.special .plate::after {
      background:
        linear-gradient(180deg, #565656 0%, #202020 48%, #000000 100%);
      box-shadow:
        inset 0 6px 8px rgba(255,255,255,0.06),
        0 10px 14px rgba(0,0,0,0.32);
    }

    .plate-highlight {
      position: absolute;
      left: 46px;
      top: 44px;
      width: 76px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.42);
      filter: blur(3px);
      z-index: 3;
      pointer-events: none;
    }

    .plate-wrap.special .plate-highlight {
      background: rgba(255,255,255,0.16);
    }

    /* 젤리 공통 */
    .sweet {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      z-index: 5;
      filter: drop-shadow(0 14px 8px rgba(0,0,0,0.25));
    }

    .candy-ball {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 22%, #ffffff 0%, #ffd6f0 13%, transparent 22%),
        radial-gradient(circle at 62% 72%, #ff7ac8 0%, #b64cff 50%, #5317a8 100%);
      box-shadow:
        inset 8px 8px 14px rgba(255,255,255,0.55),
        inset -10px -12px 18px rgba(65,0,100,0.45);
    }

    .jelly {
      width: 88px;
      height: 62px;
      border-radius: 45% 45% 35% 35%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), transparent 18%),
        linear-gradient(135deg, #b7ffe9, #35caff 45%, #6f59ff 100%);
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.5),
        inset -10px -10px 18px rgba(22,35,140,0.46);
    }

    .lollipop {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background:
        repeating-radial-gradient(
          circle,
          #ff5e7e 0px,
          #ff5e7e 8px,
          #fff1a8 8px,
          #fff1a8 16px,
          #7ee7ff 16px,
          #7ee7ff 24px
        );
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.5),
        inset -10px -12px 18px rgba(0,0,0,0.35);
    }

    .lollipop::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 63px;
      width: 8px;
      height: 52px;
      transform: translateX(-50%) rotate(-18deg);
      background: linear-gradient(180deg, #fff4dc, #c7a47a);
      border-radius: 999px;
      z-index: -1;
    }

    .cube-jelly {
      width: 74px;
      height: 74px;
      border-radius: 16px;
      transform: translateX(-50%) rotate(12deg);
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 18%),
        linear-gradient(135deg, #fff36b, #ff9f1c 48%, #ff4d6d 100%);
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.45),
        inset -12px -12px 18px rgba(120,35,10,0.38);
    }

    .heart-jelly {
      width: 78px;
      height: 68px;
      background:
        linear-gradient(135deg, #ff9ac8, #ff5fa2 52%, #b90059 100%);
      transform: translateX(-50%) rotate(-8deg);
      border-radius: 50% 50% 45% 45%;
      box-shadow:
        inset 8px 8px 12px rgba(255,255,255,0.45),
        inset -12px -12px 18px rgba(110,0,50,0.42);
    }

    .heart-jelly::before,
    .heart-jelly::after {
      content: "";
      position: absolute;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: inherit;
      top: -16px;
    }

    .heart-jelly::before {
      left: 0;
    }

    .heart-jelly::after {
      right: 0;
    }

    /* 마우스 포인터 */
    .special {
      cursor: grab;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .special:active {
      cursor: grabbing;
      transform: translateY(-12px) scale(1.03);
    }

    .special:hover {
      transform: translateY(-6px);
      filter: brightness(1.05);
    }

    .special:hover .sweet {
      animation: bounce 0.55s ease infinite alternate;
    }

    @keyframes bounce {
      from {
        transform: translateX(-50%) translateY(0);
      }
      to {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    .guide {
      position: absolute;
      right: 38px;
      bottom: 28px;
      color: rgba(27,31,34,0.58);
      font-size: clamp(10px, 1vw, 15px);
      letter-spacing: 0.04em;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 54%, rgba(60,70,80,0.18) 100%);
      z-index: 20;
    }
  </style>
</head>
