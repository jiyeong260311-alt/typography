<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Candy Sushi Prototype</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1b1614;
      font-family: Arial, sans-serif;
    }

    /* A3 비율 화면: 가로형 A3 비율 420:297 */
    .a3-screen {
      position: relative;
      width: min(100vw, calc(100vh * 1.414));
      height: min(100vh, calc(100vw / 1.414));
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
        linear-gradient(180deg, #2a211f 0%, #15100f 100%);
      border: 10px solid #3b2c28;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* 상단 제목 */
    .title {
      position: absolute;
      top: 28px;
      left: 40px;
      z-index: 10;
      color: #f8e8d8;
      letter-spacing: 0.08em;
      font-size: clamp(18px, 2vw, 34px);
      font-weight: 700;
    }

    .subtitle {
      position: absolute;
      top: 72px;
      left: 42px;
      z-index: 10;
      color: rgba(248, 232, 216, 0.65);
      font-size: clamp(10px, 1vw, 16px);
      letter-spacing: 0.08em;
    }

    /* 레일 전체 영역 */
    .conveyor-area {
      position: absolute;
      left: 0;
      right: 0;
      top: 18%;
      bottom: 8%;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    /* 레일 한 줄 */
    .belt-row {
      position: relative;
      width: 100%;
      height: 25%;
      overflow: hidden;
    }

    /* 레일 바닥 */
    .belt-track {
      position: absolute;
      left: -5%;
      top: 50%;
      width: 110%;
      height: 42%;
      transform: translateY(-50%);
      border-radius: 999px;
      background:
        repeating-linear-gradient(
          90deg,
          #5c4b45 0px,
          #5c4b45 40px,
          #493b36 40px,
          #493b36 80px
        );
      box-shadow:
        inset 0 8px 12px rgba(255,255,255,0.08),
        inset 0 -10px 18px rgba(0,0,0,0.35);
    }

    /* 접시들이 움직이는 긴 줄 */
    .plate-line {
      position: absolute;
      top: 50%;
      left: 0;
      display: flex;
      gap: 70px;
      align-items: center;
      transform: translateY(-50%);
      width: max-content;
      animation: moveLeft 18s linear infinite;
    }

    .belt-row:nth-child(2) .plate-line {
      animation-duration: 22s;
      animation-direction: reverse;
    }

    .belt-row:nth-child(3) .plate-line {
      animation-duration: 20s;
    }

    @keyframes moveLeft {
      from {
        transform: translateY(-50%) translateX(0);
      }
      to {
        transform: translateY(-50%) translateX(-50%);
      }
    }

    /* 접시 묶음 */
    .plate-wrap {
      position: relative;
      width: 150px;
      height: 90px;
      flex-shrink: 0;
    }

    /* 옆면 접시 */
    .plate {
      position: absolute;
      left: 0;
      bottom: 5px;
      width: 150px;
      height: 54px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, #fff7ef 0%, #e7c9b5 48%, #b78d75 100%);
      box-shadow:
        inset 0 -10px 12px rgba(96, 52, 36, 0.3),
        0 10px 14px rgba(0,0,0,0.35);
    }

    .plate::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 10px;
      width: 114px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      border: 2px solid rgba(130, 90, 70, 0.25);
    }

    .plate::after {
      content: "";
      position: absolute;
      left: 8px;
      bottom: -6px;
      width: 134px;
      height: 24px;
      border-radius: 50%;
      background: #8e604d;
      z-index: -1;
    }

    /* 젤리/사탕 공통 */
    .sweet {
      position: absolute;
      left: 50%;
      top: 2px;
      transform: translateX(-50%);
      z-index: 3;
      filter: drop-shadow(0 8px 4px rgba(0,0,0,0.35));
    }

    /* 둥근 사탕 */
    .candy-ball {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, #ffffff 0%, #ffd1ef 14%, transparent 22%),
        radial-gradient(circle at 65% 70%, #ff6ab7, #c73cff 72%);
    }

    /* 젤리 */
    .jelly {
      width: 64px;
      height: 46px;
      border-radius: 45% 45% 35% 35%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.9), transparent 18%),
        linear-gradient(135deg, #9effe0, #39baff 45%, #6f59ff 100%);
    }

    /* 막대 사탕 */
    .lollipop {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background:
        repeating-radial-gradient(
          circle,
          #ff6584 0px,
          #ff6584 7px,
          #fff0a8 7px,
          #fff0a8 14px
        );
    }

    .lollipop::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45px;
      width: 7px;
      height: 38px;
      transform: translateX(-50%) rotate(-18deg);
      background: #f3e2c8;
      border-radius: 999px;
      z-index: -1;
    }

    /* 각진 젤리 */
    .cube-jelly {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      transform: translateX(-50%) rotate(12deg);
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.85), transparent 18%),
        linear-gradient(135deg, #fff067, #ff9f1c 48%, #ff4d6d 100%);
    }

    /* 작은 하트 젤리 느낌 */
    .heart-jelly {
      width: 58px;
      height: 50px;
      background: #ff5fa2;
      transform: translateX(-50%) rotate(-8deg);
      border-radius: 50% 50% 45% 45%;
    }

    .heart-jelly::before,
    .heart-jelly::after {
      content: "";
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #ff5fa2;
      top: -13px;
    }

    .heart-jelly::before {
      left: 0;
    }

    .heart-jelly::after {
      right: 0;
    }

    /* 장식용 작은 접시 */
    .mini-food {
      position: absolute;
      left: 50%;
      top: 16px;
      width: 50px;
      height: 20px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 230, 180, 0.65);
      z-index: 2;
    }

    /* 클릭 가능한 접시 표시 */
    .special {
      cursor: pointer;
    }

    .special .plate {
      outline: 2px solid rgba(255, 220, 140, 0.65);
      outline-offset: 4px;
    }

    .special:hover {
      transform: translateY(-5px);
      transition: 0.25s;
    }

    .special:hover .sweet {
      animation: bounce 0.55s ease infinite alternate;
    }

    @keyframes bounce {
      from {
        transform: translateX(-50%) translateY(0);
      }
      to {
        transform: translateX(-50%) translateY(-8px);
      }
    }

    /* 하단 설명 */
    .guide {
      position: absolute;
      right: 38px;
      bottom: 28px;
      color: rgba(255,255,255,0.65);
      font-size: clamp(10px, 1vw, 15px);
      letter-spacing: 0.04em;
    }

    /* 화면 가장자리 어둡게 */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 52%, rgba(0,0,0,0.45) 100%);
      z-index: 20;
    }
  </style>
</head>
